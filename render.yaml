services:
  - type: web
    name: adip-backend
    runtime: python
    region: oregon
    plan: free
    rootDir: .
    buildCommand: pip install -r backend/requirements.txt && python -m backend.scripts.seed_customers && python -m backend.scripts.ingest_knowledge
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PYTHONPATH
        value: .
      - key: ENVIRONMENT
        value: production
